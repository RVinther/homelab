apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    headerStyle: clean

  services.yaml: |
    - Infrastructure:
      - ArgoCD:
          href: http://argocd.home
          icon: argo-cd.png

    - Monitoring:
      - Grafana:
          href: http://grafana.home
          icon: grafana.png

      - Logs:
          href: http://grafana.home
          icon: loki.png

      - Metrics:
          href: http://grafana.home
          icon: prometheus.png

    - Networking:
      - Pi-hole:
          href: http://192.168.87.60:8081/admin/
          icon: pi-hole.png

      - Tailscale:
          href: https://tailscale.com
          icon: tailscale.png

      - Router:
          href: http://192.168.87.1
          icon: router.png

    - Management:
      - GitHub:
          href: https://github.com/RVinther/homelab
          icon: github.png

      - ChatGPT:
          href: https://chatgpt.com
          icon: chatgpt.png

    - Daily:
      - YouTube:
          href: https://youtube.com
          icon: youtube.png

      - Gmail:
          href: https://mail.google.com
          icon: gmail.png

      - Reddit:
          href: https://reddit.com
          icon: reddit.png

      - Calendar:
          href: https://calendar.google.com
          icon: google-calendar.png

      - SDE:
          href: https://learn.sde.dk/login/index.php
          icon: google-classroom.png

  widgets.yaml: |
    - search:
        provider: google
        target: _blank

    - datetime:
        text_size: xl

  bookmarks.yaml: |
