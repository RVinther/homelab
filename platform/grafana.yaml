apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 7.x.x
      helm:
        valueFiles:
          - $values/platform/monitoring/grafana/values.yaml

    - repoURL: https://github.com/RVinther/homelab.git
      targetRevision: HEAD
      ref: values

    - repoURL: https://github.com/RVinther/homelab.git
      targetRevision: HEAD
      path: platform/monitoring/grafana-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
