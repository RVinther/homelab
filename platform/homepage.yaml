apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/RVinther/homelab.git
    targetRevision: HEAD
    path: platform/homepage

  destination:
    server: https://kubernetes.default.svc
    namespace: homepage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
