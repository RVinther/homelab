nextcloud:
  host: cloud.home

nodeSelector:
  node-role: storage

  existingSecret:
    enabled: true
    secretName: nextcloud-secret
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password

  configs:
    homelab.config.php: |
      <?php
      $CONFIG = array (
        'trusted_domains' =>
        array (
          0 => 'cloud.home',
          1 => 'homelab',
        ),
        'default_phone_region' => 'DK',
        'memcache.local' => '\\OC\\Memcache\\Redis',
        'memcache.locking' => '\\OC\\Memcache\\Redis',
        'redis' => array(
          'host' => 'nextcloud-redis-master',
          'port' => 6379,
        ),
      );

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql

  existingSecret:
    enabled: true
    secretName: nextcloud-secret
    hostKey: db-host
    databaseKey: db-name
    usernameKey: db-username
    passwordKey: db-password

redis:
  enabled: true
  master:
    nodeSelector:
      node-role: storage
  replica:
    nodeSelector:
      node-role: storage

cronjob:
  enabled: true

persistence:
  enabled: true
  storageClass: local-path
  size: 200Gi

ingress:
  enabled: true
  className: traefik

  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

  hosts:
    - host: cloud.home
      paths:
        - /

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
