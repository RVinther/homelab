apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/platform/promtail/values.yaml

    - repoURL: https://github.com/RVinther/homelab.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
